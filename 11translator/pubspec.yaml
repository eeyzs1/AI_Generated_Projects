name: rfdictionary
description: "完全免费的字典 - 跨平台英汉词典应用"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # 状态管理
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # 路由
  go_router: ^14.0.0

  # 本地数据库
  sqflite: ^2.3.3+1
  sqflite_common_ffi: ^2.3.3
  hive_flutter: ^1.1.0

  # TTS
  flutter_tts: ^4.0.2

  # UI 组件
  shimmer: ^3.0.0

  # 工具
  path_provider: ^2.1.3
  path: ^1.9.0
  shared_preferences: ^2.2.3

  # UI
  fluent_ui: ^4.14.0

  # 窗口管理（Windows）
  window_manager: ^0.3.9

  # 网络（模型下载）
  dio: ^5.4.0
  crypto: ^3.0.3

  # 文件选择
  file_picker: ^8.0.0+1

  # LLM 本地推理（使用命令行 llama.cpp）

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/qwen2.5-0.5b-instruct-q4_k_m.gguf
    - assets/qwen2.5-1.5b-instruct-q4_k_m.gguf
