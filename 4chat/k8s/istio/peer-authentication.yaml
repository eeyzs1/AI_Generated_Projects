# k8s/istio/peer-authentication.yaml
# 启用 mTLS，确保服务间通信加密
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
  namespace: default
spec:
  mtls:
    mode: STRICT
---
# 允许跨集群健康检查不走 mTLS
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: health-check
  namespace: default
spec:
  selector:
    matchLabels:
      health-check: "true"
  mtls:
    mode: PERMISSIVE
