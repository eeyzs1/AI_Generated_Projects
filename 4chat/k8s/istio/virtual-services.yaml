# k8s/istio/virtual-services.yaml
# 流量路由规则：支持金丝雀发布、故障注入、重试

apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: user-service
spec:
  hosts:
    - user-service
  http:
    - retries:
        attempts: 3
        perTryTimeout: 5s
        retryOn: 5xx,reset,connect-failure
      timeout: 15s
      route:
        - destination:
            host: user-service
---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: group-service
spec:
  hosts:
    - group-service
  http:
    - retries:
        attempts: 3
        perTryTimeout: 5s
        retryOn: 5xx,reset,connect-failure
      timeout: 15s
      route:
        - destination:
            host: group-service
---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: message-service
spec:
  hosts:
    - message-service
  http:
    - retries:
        attempts: 3
        perTryTimeout: 5s
        retryOn: 5xx,reset,connect-failure
      timeout: 15s
      route:
        - destination:
            host: message-service
---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: connector-service
spec:
  hosts:
    - connector-service
  http:
    - match:
        - uri:
            prefix: /ws/
      timeout: 0s  # WebSocket 不超时
      route:
        - destination:
            host: connector-service
---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: storage-service
spec:
  hosts:
    - storage-service
  http:
    - retries:
        attempts: 2
        perTryTimeout: 10s
        retryOn: 5xx,reset,connect-failure
      timeout: 30s
      route:
        - destination:
            host: storage-service
