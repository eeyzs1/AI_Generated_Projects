# k8s/istio/destination-rules.yaml
# 为每个服务定义负载均衡策略和熔断规则

# user-service
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: user-service
spec:
  host: user-service
  trafficPolicy:
    loadBalancer:
      simple: LEAST_CONN
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        http1MaxPendingRequests: 50
        http2MaxRequests: 100
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
---
# group-service
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: group-service
spec:
  host: group-service
  trafficPolicy:
    loadBalancer:
      simple: LEAST_CONN
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
---
# message-service
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: message-service
spec:
  host: message-service
  trafficPolicy:
    loadBalancer:
      simple: ROUND_ROBIN
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
---
# connector-service
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: connector-service
spec:
  host: connector-service
  trafficPolicy:
    loadBalancer:
      # WebSocket 需要会话保持，使用 header hash
      consistentHash:
        httpHeaderName: "x-user-id"
    connectionPool:
      http:
        h2UpgradePolicy: DO_NOT_UPGRADE  # WebSocket 不升级到 HTTP/2
---
# storage-service
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: storage-service
spec:
  host: storage-service
  trafficPolicy:
    loadBalancer:
      simple: ROUND_ROBIN
    outlierDetection:
      consecutive5xxErrors: 3
      interval: 30s
      baseEjectionTime: 60s
