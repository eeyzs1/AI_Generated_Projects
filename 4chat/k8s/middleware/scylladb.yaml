# k8s/middleware/scylladb.yaml
# ScyllaDB 单节点（开发/测试）
# 生产环境建议使用 ScyllaDB Operator 部署3节点集群

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: scylladb
spec:
  selector:
    matchLabels:
      app: scylladb
  serviceName: scylladb
  replicas: 1
  template:
    metadata:
      labels:
        app: scylladb
    spec:
      containers:
        - name: scylladb
          image: scylladb/scylla:5.4
          args: ["--smp", "1", "--memory", "512M", "--overprovisioned", "1"]
          ports:
            - containerPort: 9042
              name: cql
          volumeMounts:
            - name: data
              mountPath: /var/lib/scylla
          readinessProbe:
            exec:
              command: ["cqlsh", "-e", "describe keyspaces"]
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: scylladb
spec:
  selector:
    app: scylladb
  ports:
    - port: 9042
      name: cql
