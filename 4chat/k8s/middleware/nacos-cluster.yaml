apiVersion: v1
kind: ConfigMap
metadata:
  name: nacos-cluster-config
data:
  cluster.conf: |
    nacos-0.nacos.default.svc.cluster.local:8848
    nacos-1.nacos.default.svc.cluster.local:8848
    nacos-2.nacos.default.svc.cluster.local:8848
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nacos
spec:
  selector:
    matchLabels:
      app: nacos
  serviceName: nacos
  replicas: 3
  template:
    metadata:
      labels:
        app: nacos
    spec:
      containers:
        - name: nacos
          image: nacos/nacos-server:v2.3.0
          env:
            - name: MODE
              value: cluster
            - name: PREFER_HOST_MODE
              value: hostname
            - name: SPRING_DATASOURCE_PLATFORM
              value: mysql
            - name: MYSQL_SERVICE_HOST
              value: mysql-master
            - name: MYSQL_SERVICE_PORT
              value: "3306"
            - name: MYSQL_SERVICE_DB_NAME
              value: nacos_config
            - name: MYSQL_SERVICE_USER
              value: root
            - name: MYSQL_SERVICE_PASSWORD
              value: root123
          ports:
            - containerPort: 8848
              name: http
            - containerPort: 9848
              name: grpc
          volumeMounts:
            - name: cluster-config
              mountPath: /home/nacos/conf/cluster.conf
              subPath: cluster.conf
          readinessProbe:
            httpGet:
              path: /nacos/v1/console/health/readiness
              port: 8848
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 10
      volumes:
        - name: cluster-config
          configMap:
            name: nacos-cluster-config
---
# Headless service for StatefulSet DNS
apiVersion: v1
kind: Service
metadata:
  name: nacos
spec:
  selector:
    app: nacos
  clusterIP: None
  ports:
    - name: http
      port: 8848
    - name: grpc
      port: 9848
---
# Regular service for client access (load balanced)
apiVersion: v1
kind: Service
metadata:
  name: nacos-client
spec:
  selector:
    app: nacos
  ports:
    - name: http
      port: 8848
    - name: grpc
      port: 9848
