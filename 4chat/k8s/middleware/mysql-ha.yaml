apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-master-config
data:
  master.cnf: |
    [mysqld]
    server-id=1
    log-bin=mysql-bin
    binlog-format=ROW
    sync_binlog=1
    innodb_flush_log_at_trx_commit=1
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-slave-config
data:
  slave.cnf: |
    [mysqld]
    server-id=2
    relay-log=relay-bin
    log-bin=mysql-bin
    binlog-format=ROW
    read_only=1
    super_read_only=1
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-master-pvc
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-slave-pvc
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init
data:
  init.sql: |
    CREATE DATABASE IF NOT EXISTS im_user CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
    CREATE DATABASE IF NOT EXISTS im_group CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
    CREATE DATABASE IF NOT EXISTS im_message CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
    CREATE DATABASE IF NOT EXISTS im_storage CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
    CREATE DATABASE IF NOT EXISTS nacos_config CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
    GRANT ALL PRIVILEGES ON *.* TO 'root'@'%';
    FLUSH PRIVILEGES;
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql-master
spec:
  selector:
    matchLabels:
      app: mysql-master
  serviceName: mysql-master
  replicas: 1
  template:
    metadata:
      labels:
        app: mysql-master
    spec:
      containers:
        - name: mysql
          image: mysql:8.4
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: root123
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
            - name: config
              mountPath: /etc/mysql/conf.d
            - name: init
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mysql-master-pvc
        - name: config
          configMap:
            name: mysql-master-config
        - name: init
          configMap:
            name: mysql-init
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-master
spec:
  selector:
    app: mysql-master
  ports:
    - port: 3306
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql-slave
spec:
  selector:
    matchLabels:
      app: mysql-slave
  serviceName: mysql-slave
  replicas: 1
  template:
    metadata:
      labels:
        app: mysql-slave
    spec:
      initContainers:
        - name: init-slave
          image: mysql:8.4
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: root123
          command:
            - bash
            - "-c"
            - |
              until mysqladmin ping -h mysql-master -uroot -proot123 --silent; do
                echo "Waiting for mysql-master..."
                sleep 5
              done
              echo "Master is ready"
      containers:
        - name: mysql
          image: mysql:8.4
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: root123
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
            - name: config
              mountPath: /etc/mysql/conf.d
          readinessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
            initialDelaySeconds: 20
            periodSeconds: 10
          lifecycle:
            postStart:
              exec:
                command:
                  - bash
                  - "-c"
                  - |
                    sleep 10
                    mysql -uroot -proot123 -e "
                      CHANGE MASTER TO
                        MASTER_HOST='mysql-master',
                        MASTER_USER='root',
                        MASTER_PASSWORD='root123',
                        MASTER_AUTO_POSITION=1;
                      START SLAVE;
                    " || true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mysql-slave-pvc
        - name: config
          configMap:
            name: mysql-slave-config
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-slave
spec:
  selector:
    app: mysql-slave
  ports:
    - port: 3306
