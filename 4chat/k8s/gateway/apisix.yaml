apiVersion: v1
kind: ConfigMap
metadata:
  name: apisix-config
data:
  config.yaml: |
    apisix:
      node_listen: 9080
      enable_ipv6: false
      config_center: yaml

    deployment:
      role: traditional
      role_traditional:
        config_provider: yaml
  apisix.yaml: |
    routes:
      - id: user-service-route
        uri: /api/user/*
        upstream:
          nodes:
            "user-service:8001": 1
          type: roundrobin
        plugins:
          cors:
            allow_origins: "*"
            allow_methods: "GET,POST,PUT,DELETE,OPTIONS"
            allow_headers: "Authorization,Content-Type"

      - id: group-service-route
        uri: /api/group/*
        upstream:
          nodes:
            "group-service:8002": 1
          type: roundrobin
        plugins:
          cors:
            allow_origins: "*"
            allow_methods: "GET,POST,PUT,DELETE,OPTIONS"
            allow_headers: "Authorization,Content-Type"

      - id: message-service-route
        uri: /api/message/*
        upstream:
          nodes:
            "message-service:8003": 1
          type: roundrobin
        plugins:
          cors:
            allow_origins: "*"
            allow_methods: "GET,POST,PUT,DELETE,OPTIONS"
            allow_headers: "Authorization,Content-Type"

      - id: connector-service-ws-route
        uri: /ws/*
        upstream:
          nodes:
            "connector-service:8004": 1
          type: roundrobin
        plugins:
          proxy-rewrite:
            use_real_request_uri_unsafe: true

      - id: storage-service-route
        uri: /api/storage/*
        upstream:
          nodes:
            "storage-service:8006": 1
          type: roundrobin
        plugins:
          cors:
            allow_origins: "*"
            allow_methods: "GET,POST,PUT,DELETE,OPTIONS"
            allow_headers: "Authorization,Content-Type"

    #END
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apisix
spec:
  selector:
    matchLabels:
      app: apisix
  replicas: 1
  template:
    metadata:
      labels:
        app: apisix
    spec:
      containers:
        - name: apisix
          image: apache/apisix:3.13-debian
          env:
            - name: APISIX_STAND_ALONE
              value: "true"
          ports:
            - containerPort: 9080
          volumeMounts:
            - name: config
              mountPath: /usr/local/apisix/conf/config.yaml
              subPath: config.yaml
            - name: config
              mountPath: /usr/local/apisix/conf/apisix.yaml
              subPath: apisix.yaml
          readinessProbe:
            httpGet:
              path: /apisix/status
              port: 9080
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: apisix-config
---
apiVersion: v1
kind: Service
metadata:
  name: apisix
spec:
  selector:
    app: apisix
  type: NodePort
  ports:
    - port: 9080
      nodePort: 30080
