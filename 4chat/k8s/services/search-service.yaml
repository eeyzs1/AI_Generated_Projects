apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-service
  labels:
    app: search-service
spec:
  selector:
    matchLabels:
      app: search-service
  replicas: 1
  template:
    metadata:
      labels:
        app: search-service
    spec:
      containers:
        - name: search-service
          image: localhost:5000/search-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8007
          env:
            - name: ELASTICSEARCH_HOSTS
              value: http://elasticsearch:9200
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092
            - name: NACOS_HOST
              value: nacos
            - name: NACOS_PORT
              value: "8848"
            - name: SERVICE_HOST
              value: search-service
            - name: SERVICE_PORT
              value: "8007"
            - name: SECRET_KEY
              value: "your-secret-key-change-in-production"
            - name: ACCESS_SECRET_KEY
              value: "your-secret-key-change-in-production"
            - name: CELERY_BROKER_URL
              value: redis://redis:6379/1
            - name: CELERY_RESULT_BACKEND
              value: redis://redis:6379/2
          readinessProbe:
            httpGet:
              path: /health
              port: 8007
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: search-service
  labels:
    app: search-service
spec:
  selector:
    app: search-service
  ports:
    - port: 8007
