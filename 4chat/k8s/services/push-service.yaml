apiVersion: apps/v1
kind: Deployment
metadata:
  name: push-service
spec:
  selector:
    matchLabels:
      app: push-service
  replicas: 1
  template:
    metadata:
      labels:
        app: push-service
    spec:
      containers:
        - name: push-service
          image: localhost:5000/push-service:latest
          ports:
            - containerPort: 8005
          env:
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092
            - name: NACOS_HOST
              value: nacos
            - name: NACOS_PORT
              value: "8848"
            - name: SERVICE_HOST
              value: push-service
            - name: SERVICE_PORT
              value: "8005"
            - name: USER_SERVICE_URL
              value: http://user-service:8001
            - name: GROUP_SERVICE_URL
              value: http://group-service:8002
            - name: SMTP_HOST
              value: ""
            - name: SMTP_PORT
              value: "587"
            - name: SMTP_USER
              value: ""
            - name: SMTP_PASSWORD
              value: ""
          readinessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: push-service
spec:
  selector:
    app: push-service
  ports:
    - port: 8005
