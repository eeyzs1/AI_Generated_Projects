apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: storage-pvc
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: storage-service
spec:
  selector:
    matchLabels:
      app: storage-service
  replicas: 1
  template:
    metadata:
      labels:
        app: storage-service
    spec:
      containers:
        - name: storage-service
          image: localhost:5000/storage-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8006
          env:
            - name: NACOS_HOST
              value: nacos
            - name: NACOS_PORT
              value: "8848"
            - name: SERVICE_HOST
              value: storage-service
            - name: SERVICE_PORT
              value: "8006"
            - name: SECRET_KEY
              value: "your-secret-key-change-in-production"
            - name: ACCESS_SECRET_KEY
              value: "your-secret-key-change-in-production"
          volumeMounts:
            - name: avatars
              mountPath: /app/static/avatars/uploads
          readinessProbe:
            httpGet:
              path: /health
              port: 8006
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: avatars
          persistentVolumeClaim:
            claimName: storage-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: storage-service
spec:
  selector:
    app: storage-service
  ports:
    - port: 8006
