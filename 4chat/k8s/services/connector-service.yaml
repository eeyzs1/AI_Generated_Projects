apiVersion: apps/v1
kind: Deployment
metadata:
  name: connector-service
spec:
  selector:
    matchLabels:
      app: connector-service
  replicas: 1
  template:
    metadata:
      labels:
        app: connector-service
    spec:
      containers:
        - name: connector-service
          image: localhost:5000/connector-service:latest
          ports:
            - containerPort: 8004
          env:
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092
            - name: NACOS_HOST
              value: nacos
            - name: NACOS_PORT
              value: "8848"
            - name: SERVICE_HOST
              value: connector-service
            - name: SERVICE_PORT
              value: "8004"
            - name: USER_SERVICE_URL
              value: http://user-service:8001
            - name: GROUP_SERVICE_URL
              value: http://group-service:8002
            - name: SECRET_KEY
              value: "your-secret-key-change-in-production"
            - name: ACCESS_SECRET_KEY
              value: "your-secret-key-change-in-production"
          readinessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: connector-service
spec:
  selector:
    app: connector-service
  ports:
    - port: 8004
