apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
spec:
  selector:
    matchLabels:
      app: user-service
  replicas: 1
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: localhost:5000/user-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8001
          env:
            - name: DATABASE_URL
              value: mysql+pymysql://root:root123@mysql:3306/im_user
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: NACOS_HOST
              value: nacos
            - name: NACOS_PORT
              value: "8848"
            - name: SERVICE_HOST
              value: user-service
            - name: SERVICE_PORT
              value: "8001"
            - name: SECRET_KEY
              value: "your-secret-key-change-in-production"
            - name: ACCESS_SECRET_KEY
              value: "your-secret-key-change-in-production"
            - name: SMTP_HOST
              value: ""
            - name: SMTP_PORT
              value: "587"
            - name: SMTP_USER
              value: ""
            - name: SMTP_PASSWORD
              value: ""
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092
            - name: CDN_BASE_URL
              value: ""
            - name: CELERY_BROKER_URL
              value: redis://redis:6379/1
            - name: CELERY_RESULT_BACKEND
              value: redis://redis:6379/2
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
spec:
  selector:
    app: user-service
  ports:
    - port: 8001
