apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker-emails
  labels:
    app: celery-worker-emails
spec:
  selector:
    matchLabels:
      app: celery-worker-emails
  replicas: 1
  template:
    metadata:
      labels:
        app: celery-worker-emails
    spec:
      containers:
        - name: celery-worker-emails
          image: localhost:5000/celery-worker:latest
          imagePullPolicy: Never
          env:
            - name: CELERY_BROKER_URL
              value: redis://redis:6379/1
            - name: CELERY_RESULT_BACKEND
              value: redis://redis:6379/2
            - name: SMTP_SERVER
              value: ""
            - name: SMTP_PORT
              value: "587"
            - name: SMTP_USER
              value: ""
            - name: SMTP_PASSWORD
              value: ""
            - name: FRONTEND_URL
              value: http://localhost:30000
          command: ["celery", "-A", "services.common.celery_app", "worker", "-Q", "emails", "--loglevel=info", "-c", "4"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker-default
  labels:
    app: celery-worker-default
spec:
  selector:
    matchLabels:
      app: celery-worker-default
  replicas: 1
  template:
    metadata:
      labels:
        app: celery-worker-default
    spec:
      containers:
        - name: celery-worker-default
          image: localhost:5000/celery-worker:latest
          imagePullPolicy: Never
          env:
            - name: CELERY_BROKER_URL
              value: redis://redis:6379/1
            - name: CELERY_RESULT_BACKEND
              value: redis://redis:6379/2
            - name: DATABASE_URL
              value: mysql+pymysql://root:root123@mysql:3306/im_user
            - name: SCYLLA_HOSTS
              value: scylladb
            - name: SCYLLA_PORT
              value: "9042"
            - name: SCYLLA_KEYSPACE
              value: im_message
            - name: ELASTICSEARCH_HOSTS
              value: http://elasticsearch:9200
            - name: AVATAR_UPLOAD_DIR
              value: /app/static/avatars
          command: ["celery", "-A", "services.common.celery_app", "worker", "-Q", "default,search,maintenance", "--loglevel=info", "-c", "2"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-beat
  labels:
    app: celery-beat
spec:
  selector:
    matchLabels:
      app: celery-beat
  replicas: 1
  template:
    metadata:
      labels:
        app: celery-beat
    spec:
      containers:
        - name: celery-beat
          image: localhost:5000/celery-worker:latest
          imagePullPolicy: Never
          env:
            - name: CELERY_BROKER_URL
              value: redis://redis:6379/1
            - name: CELERY_RESULT_BACKEND
              value: redis://redis:6379/2
            - name: DATABASE_URL
              value: mysql+pymysql://root:root123@mysql:3306/im_user
          command: ["celery", "-A", "services.common.celery_app", "beat", "--loglevel=info"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-flower
  labels:
    app: celery-flower
spec:
  selector:
    matchLabels:
      app: celery-flower
  replicas: 1
  template:
    metadata:
      labels:
        app: celery-flower
    spec:
      containers:
        - name: celery-flower
          image: mher/flower:2.0
          env:
            - name: CELERY_BROKER_URL
              value: redis://redis:6379/1
            - name: FLOWER_PORT
              value: "5555"
          ports:
            - containerPort: 5555
---
apiVersion: v1
kind: Service
metadata:
  name: celery-flower
  labels:
    app: celery-flower
spec:
  selector:
    app: celery-flower
  type: NodePort
  ports:
    - port: 5555
      nodePort: 30555
