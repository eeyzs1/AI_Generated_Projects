# k8s/overlays/multi-cluster/kustomization.yaml
# Kustomize overlay：多集群 Istio 服务网格方案
#
# 集群A（区域A）：user-service, group-service, message-service
# 集群B（区域B）：connector-service, push-service, storage-service
#
# 使用方式：
#   集群A: kubectl apply -k k8s/overlays/multi-cluster/ --context=cluster-a
#   集群B: kubectl apply -k k8s/overlays/multi-cluster/ --context=cluster-b

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # 业务服务
  - ../../services/user-service.yaml
  - ../../services/group-service.yaml
  - ../../services/message-service.yaml
  - ../../services/connector-service.yaml
  - ../../services/push-service.yaml
  - ../../services/storage-service.yaml
  - ../../services/frontend.yaml
  # Istio 流量管理
  - ../../istio/destination-rules.yaml
  - ../../istio/virtual-services.yaml
  - ../../istio/peer-authentication.yaml
  - ../../istio/east-west-gateway.yaml
  - ../../istio/service-entries.yaml

patches:
  - path: replica-patch.yaml
    target:
      kind: Deployment
