# k8s/overlays/cloud/cloud-env-patch.yaml
# 修改此文件，填写你的云服务连接信息
# 此 patch 会覆盖所有业务服务的环境变量

apiVersion: apps/v1
kind: Deployment
metadata:
  name: placeholder  # 由 kustomization.yaml 中的 target 覆盖
spec:
  template:
    spec:
      containers:
        - name: placeholder  # 由 kustomization.yaml 中的 target 覆盖
          env:
            # ── MySQL 连接串（每个服务对应不同数据库）──────────
            - name: DATABASE_URL
              value: "mysql+pymysql://user:password@your-rds-host:3306/im_placeholder"

            # ── Redis ────────────────────────────────────────
            - name: REDIS_URL
              value: "redis://:password@your-elasticache-host:6379/0"

            # ── Kafka ────────────────────────────────────────
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "your-msk-broker:9092"

            # ── Nacos（如使用云上自建 Nacos）────────────────
            - name: NACOS_HOST
              value: "your-nacos-host"
            - name: NACOS_PORT
              value: "8848"

            # ── 密钥 ─────────────────────────────────────────
            - name: SECRET_KEY
              value: "your-secret-key-change-in-production"
            - name: ACCESS_SECRET_KEY
              value: "your-secret-key-change-in-production"

            # ── SMTP 邮件（可选）─────────────────────────────
            - name: SMTP_HOST
              value: ""
            - name: SMTP_PORT
              value: "587"
            - name: SMTP_USER
              value: ""
            - name: SMTP_PASSWORD
              value: ""
