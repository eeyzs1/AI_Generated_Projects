{{- if .Values.connectorService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: connector-service
  labels:
    app: connector-service
    {{- include "services.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: connector-service
  replicas: {{ .Values.connectorService.replicas }}
  template:
    metadata:
      labels:
        app: connector-service
    spec:
      containers:
        - name: connector-service
          image: {{ include "services.image" (list . .Values.connectorService.image) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 8004
          env:
            - name: REDIS_URL
              value: {{ .Values.global.redis.url }}
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: {{ .Values.global.kafka.bootstrapServers }}
            - name: NACOS_HOST
              value: {{ .Values.global.nacos.host }}
            - name: NACOS_PORT
              value: {{ .Values.global.nacos.port | quote }}
            - name: SERVICE_HOST
              value: connector-service
            - name: SERVICE_PORT
              value: "8004"
            - name: USER_SERVICE_URL
              value: http://user-service:8001
            - name: GROUP_SERVICE_URL
              value: http://group-service:8002
            - name: SECRET_KEY
              value: {{ .Values.global.secretKey | quote }}
            - name: ACCESS_SECRET_KEY
              value: {{ .Values.global.secretKey | quote }}
          readinessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: connector-service
  labels:
    app: connector-service
    {{- include "services.labels" . | nindent 4 }}
spec:
  selector:
    app: connector-service
  ports:
    - port: 8004
{{- end }}
