{{- if .Values.groupService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: group-service
  labels:
    app: group-service
    {{- include "services.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: group-service
  replicas: {{ .Values.groupService.replicas }}
  template:
    metadata:
      labels:
        app: group-service
    spec:
      containers:
        - name: group-service
          image: {{ include "services.image" (list . .Values.groupService.image) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 8002
          env:
            - name: DATABASE_URL
              value: mysql+pymysql://root:{{ .Values.global.mysql.password }}@{{ .Values.global.mysql.host }}:{{ .Values.global.mysql.port }}/im_group
            - name: NACOS_HOST
              value: {{ .Values.global.nacos.host }}
            - name: NACOS_PORT
              value: {{ .Values.global.nacos.port | quote }}
            - name: SERVICE_HOST
              value: group-service
            - name: SERVICE_PORT
              value: "8002"
            - name: USER_SERVICE_URL
              value: http://user-service:8001
            - name: SECRET_KEY
              value: {{ .Values.global.secretKey | quote }}
            - name: ACCESS_SECRET_KEY
              value: {{ .Values.global.secretKey | quote }}
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: {{ .Values.global.kafka.bootstrapServers }}
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: group-service
  labels:
    app: group-service
    {{- include "services.labels" . | nindent 4 }}
spec:
  selector:
    app: group-service
  ports:
    - port: 8002
{{- end }}
