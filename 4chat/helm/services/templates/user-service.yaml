{{- if .Values.userService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  labels:
    app: user-service
    {{- include "services.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: user-service
  replicas: {{ .Values.userService.replicas }}
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: {{ include "services.image" (list . .Values.userService.image) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 8001
          env:
            - name: DATABASE_URL
              value: mysql+pymysql://root:{{ .Values.global.mysql.password }}@{{ .Values.global.mysql.host }}:{{ .Values.global.mysql.port }}/im_user
            - name: REDIS_URL
              value: {{ .Values.global.redis.url }}
            - name: NACOS_HOST
              value: {{ .Values.global.nacos.host }}
            - name: NACOS_PORT
              value: {{ .Values.global.nacos.port | quote }}
            - name: SERVICE_HOST
              value: user-service
            - name: SERVICE_PORT
              value: "8001"
            - name: SECRET_KEY
              value: {{ .Values.global.secretKey | quote }}
            - name: ACCESS_SECRET_KEY
              value: {{ .Values.global.secretKey | quote }}
            - name: SMTP_HOST
              value: {{ .Values.userService.smtp.host | quote }}
            - name: SMTP_PORT
              value: {{ .Values.userService.smtp.port | quote }}
            - name: SMTP_USER
              value: {{ .Values.userService.smtp.user | quote }}
            - name: SMTP_PASSWORD
              value: {{ .Values.userService.smtp.password | quote }}
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: {{ .Values.global.kafka.bootstrapServers }}
            - name: CDN_BASE_URL
              value: {{ .Values.userService.cdnBaseUrl | quote }}
            - name: CELERY_BROKER_URL
              value: {{ .Values.global.celery.brokerUrl }}
            - name: CELERY_RESULT_BACKEND
              value: {{ .Values.global.celery.resultBackend }}
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  labels:
    app: user-service
    {{- include "services.labels" . | nindent 4 }}
spec:
  selector:
    app: user-service
  ports:
    - port: 8001
{{- end }}
