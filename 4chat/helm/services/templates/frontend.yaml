{{- if .Values.frontend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: frontend
    {{- include "services.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: frontend
  replicas: {{ .Values.frontend.replicas }}
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: {{ include "services.image" (list . .Values.frontend.image) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  labels:
    app: frontend
    {{- include "services.labels" . | nindent 4 }}
spec:
  selector:
    app: frontend
  type: NodePort
  ports:
    - port: 3000
      nodePort: {{ .Values.frontend.nodePort }}
{{- end }}
