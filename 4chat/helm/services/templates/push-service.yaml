{{- if .Values.pushService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: push-service
  labels:
    app: push-service
    {{- include "services.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: push-service
  replicas: {{ .Values.pushService.replicas }}
  template:
    metadata:
      labels:
        app: push-service
    spec:
      containers:
        - name: push-service
          image: {{ include "services.image" (list . .Values.pushService.image) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 8005
          env:
            - name: REDIS_URL
              value: {{ .Values.global.redis.url }}
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: {{ .Values.global.kafka.bootstrapServers }}
            - name: NACOS_HOST
              value: {{ .Values.global.nacos.host }}
            - name: NACOS_PORT
              value: {{ .Values.global.nacos.port | quote }}
            - name: SERVICE_HOST
              value: push-service
            - name: SERVICE_PORT
              value: "8005"
            - name: USER_SERVICE_URL
              value: http://user-service:8001
            - name: GROUP_SERVICE_URL
              value: http://group-service:8002
            - name: SMTP_HOST
              value: {{ .Values.pushService.smtp.host | quote }}
            - name: SMTP_PORT
              value: {{ .Values.pushService.smtp.port | quote }}
            - name: SMTP_USER
              value: {{ .Values.pushService.smtp.user | quote }}
            - name: SMTP_PASSWORD
              value: {{ .Values.pushService.smtp.password | quote }}
          readinessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: push-service
  labels:
    app: push-service
    {{- include "services.labels" . | nindent 4 }}
spec:
  selector:
    app: push-service
  ports:
    - port: 8005
{{- end }}
