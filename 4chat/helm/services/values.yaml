global:
  registry: "localhost:5000"
  imagePullPolicy: Never
  secretKey: "your-secret-key-change-in-production"
  # 中间件连接（默认指向同集群 middleware chart 部署的服务）
  mysql:
    host: mysql
    port: 3306
    password: root123
  redis:
    url: redis://redis:6379/0
  kafka:
    bootstrapServers: kafka:9092
  nacos:
    host: nacos
    port: 8848
  scylla:
    host: scylladb
    port: 9042

userService:
  enabled: true
  replicas: 1
  image: user-service:latest
  smtp:
    host: ""
    port: "587"
    user: ""
    password: ""

groupService:
  enabled: true
  replicas: 1
  image: group-service:latest

messageService:
  enabled: true
  replicas: 1
  image: message-service:latest

connectorService:
  enabled: true
  replicas: 1
  image: connector-service:latest

pushService:
  enabled: true
  replicas: 1
  image: push-service:latest
  smtp:
    host: ""
    port: "587"
    user: ""
    password: ""

storageService:
  enabled: true
  replicas: 1
  image: storage-service:latest
  storage: 2Gi

frontend:
  enabled: true
  replicas: 1
  image: frontend:latest
  nodePort: 30000

apisix:
  enabled: true
  image: apache/apisix:3.15.0-ubuntu
  nodePort: 30080
