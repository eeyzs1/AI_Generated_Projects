global:
  registry: "localhost:5000"
  imagePullPolicy: Never
  secretKey: "your-secret-key-change-in-production"
  mysql:
    host: mysql
    port: 3306
    password: root123
  redis:
    url: redis://redis:6379/0
  kafka:
    bootstrapServers: kafka:9092
  nacos:
    host: nacos
    port: 8848
  scylla:
    host: scylladb
    port: 9042
  elasticsearch:
    hosts: http://elasticsearch:9200
  celery:
    brokerUrl: redis://redis:6379/1
    resultBackend: redis://redis:6379/2

userService:
  enabled: true
  replicas: 1
  image: user-service:latest
  smtp:
    host: ""
    port: "587"
    user: ""
    password: ""
  cdnBaseUrl: ""

groupService:
  enabled: true
  replicas: 1
  image: group-service:latest

messageService:
  enabled: true
  replicas: 1
  image: message-service:latest

connectorService:
  enabled: true
  replicas: 1
  image: connector-service:latest

pushService:
  enabled: true
  replicas: 1
  image: push-service:latest
  smtp:
    host: ""
    port: "587"
    user: ""
    password: ""

storageService:
  enabled: true
  replicas: 1
  image: storage-service:latest
  storage: 2Gi
  cdnBaseUrl: ""

searchService:
  enabled: true
  replicas: 1
  image: search-service:latest

celeryWorkerEmails:
  enabled: true
  replicas: 1
  image: celery-worker:latest
  concurrency: 4

celeryWorkerDefault:
  enabled: true
  replicas: 1
  image: celery-worker:latest
  concurrency: 2

celeryBeat:
  enabled: true
  image: celery-worker:latest

celeryFlower:
  enabled: true
  image: mher/flower:2.0
  nodePort: 30555

frontend:
  enabled: true
  replicas: 1
  image: frontend:latest
  nodePort: 30000

apisix:
  enabled: true
  image: apache/apisix:3.15.0-ubuntu
  nodePort: 30080
