{{- if .Values.kafka.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-log4j
  labels:
    app: kafka
    {{- include "middleware.labels" . | nindent 4 }}
data:
  log4j.properties: |
    log4j.rootLogger=INFO, stdout
    log4j.appender.stdout=org.apache.log4j.ConsoleAppender
    log4j.appender.stdout.layout=org.apache.log4j.PatternLayout
    log4j.appender.stdout.layout.ConversionPattern=[%d] %p %m (%c)%n
    log4j.logger.kafka=INFO
    log4j.logger.org.apache.kafka=INFO
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zookeeper
  labels:
    app: zookeeper
    {{- include "middleware.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: zookeeper
  replicas: 1
  template:
    metadata:
      labels:
        app: zookeeper
    spec:
      containers:
        - name: zookeeper
          image: {{ .Values.kafka.zookeeperImage }}
          env:
            - name: ZOOKEEPER_CLIENT_PORT
              value: "2181"
            - name: ZOOKEEPER_TICK_TIME
              value: "2000"
          ports:
            - containerPort: 2181
---
apiVersion: v1
kind: Service
metadata:
  name: zookeeper
  labels:
    app: zookeeper
    {{- include "middleware.labels" . | nindent 4 }}
spec:
  selector:
    app: zookeeper
  ports:
    - port: 2181
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  labels:
    app: kafka
    {{- include "middleware.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: kafka
  replicas: 1
  template:
    metadata:
      labels:
        app: kafka
    spec:
      enableServiceLinks: false
      securityContext:
        fsGroup: 1000
        runAsUser: 0
      initContainers:
        - name: wait-for-zookeeper
          image: {{ .Values.kafka.zookeeperImage }}
          command: ['sh', '-c', 'until nc -z zookeeper 2181; do echo waiting for zookeeper; sleep 2; done']
      containers:
        - name: kafka
          image: {{ .Values.kafka.image }}
          env:
            - name: KAFKA_BROKER_ID
              value: "1"
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: zookeeper:2181
            - name: KAFKA_LISTENERS
              value: PLAINTEXT://0.0.0.0:9092
            - name: KAFKA_ADVERTISED_LISTENERS
              value: PLAINTEXT://kafka:9092
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: PLAINTEXT:PLAINTEXT
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: PLAINTEXT
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
            - name: KAFKA_OPTS
              value: "-Dzookeeper.sasl.client=false"
            - name: CUB_ZK_TIMEOUT
              value: "60"
            - name: KAFKA_LOG4J_OPTS
              value: "-Dlog4j.configuration=file:/tmp/log4j.properties"
            - name: LOG_DIR
              value: "/tmp/kafka-logs"
          ports:
            - containerPort: 9092
          command:
            - /bin/sh
            - -c
            - |
              export KAFKA_LOG_DIRS=/tmp/kafka-data
              mkdir -p /tmp/kafka-data
              /etc/confluent/docker/run
          volumeMounts:
            - name: log4j-config
              mountPath: /tmp/log4j.properties
              subPath: log4j.properties
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 10
      volumes:
        - name: log4j-config
          configMap:
            name: kafka-log4j
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  labels:
    app: kafka
    {{- include "middleware.labels" . | nindent 4 }}
spec:
  selector:
    app: kafka
  ports:
    - port: 9092
{{- end }}
