# docker-compose.multi-region.yml
# 模拟跨区域部署场景
# 架构：
#   - 一个中心化 Nacos（所有区域共享）
#   - 区域A：user-service, group-service, message-service
#   - 区域B：connector-service, push-service, storage-service
#   - 共享中间件：MySQL, Redis, Kafka
#
# 使用方式：
#   docker-compose -f docker-compose.multi-region.yml up -d
#
# 真实跨区域部署时：
#   1. 将 NACOS_HOST 指向公网可访问的中心 Nacos 地址
#   2. 将 SERVICE_HOST 设置为各服务的实际公网/内网 IP
#   3. 各区域分别只启动对应的服务

version: '3.8'

services:
  # ── 共享基础设施 ─────────────────────────────────────────────
  mysql:
    image: mysql:8.4
    container_name: im-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: im_user
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    container_name: im-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4
    container_name: im-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.4
    container_name: im-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ── 中心化 Nacos（跨区域共享）────────────────────────────────
  # 真实场景中此服务部署在公网，所有区域的服务都指向它
  nacos:
    image: nacos/nacos-server:v2.3
    container_name: im-nacos-central
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
    ports:
      - "8848:8848"
      - "9848:9848"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── 区域A 服务（模拟：用户/群组/消息）────────────────────────
  user-service-region-a:
    build: ./services/user-service
    container_name: im-user-service-a
    ports:
      - "8101:8001"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://root:root123@mysql:3306/im_user
      REDIS_URL: redis://redis:6379/0
      NACOS_HOST: nacos
      NACOS_PORT: "8848"
      SERVICE_HOST: user-service-region-a  # 真实场景填写公网IP
      SERVICE_PORT: "8001"
      SECRET_KEY: "your-secret-key-change-in-production"
      ACCESS_SECRET_KEY: "your-secret-key-change-in-production"
    restart: on-failure

  group-service-region-a:
    build: ./services/group-service
    container_name: im-group-service-a
    ports:
      - "8102:8002"
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://root:root123@mysql:3306/im_group
      NACOS_HOST: nacos
      NACOS_PORT: "8848"
      SERVICE_HOST: group-service-region-a
      SERVICE_PORT: "8002"
      SECRET_KEY: "your-secret-key-change-in-production"
      ACCESS_SECRET_KEY: "your-secret-key-change-in-production"
    restart: on-failure

  message-service-region-a:
    build: ./services/message-service
    container_name: im-message-service-a
    ports:
      - "8103:8003"
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      nacos:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://root:root123@mysql:3306/im_message
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      NACOS_HOST: nacos
      NACOS_PORT: "8848"
      SERVICE_HOST: message-service-region-a
      SERVICE_PORT: "8003"
      SECRET_KEY: "your-secret-key-change-in-production"
      ACCESS_SECRET_KEY: "your-secret-key-change-in-production"
    restart: on-failure

  # ── 区域B 服务（模拟：连接/推送/存储）────────────────────────
  user-service-region-b:
    build: ./services/user-service
    container_name: im-user-service-b
    ports:
      - "8201:8001"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://root:root123@mysql:3306/im_user
      REDIS_URL: redis://redis:6379/0
      NACOS_HOST: nacos
      NACOS_PORT: "8848"
      SERVICE_HOST: user-service-region-b
      SERVICE_PORT: "8001"
      SECRET_KEY: "your-secret-key-change-in-production"
      ACCESS_SECRET_KEY: "your-secret-key-change-in-production"
    restart: on-failure

  connector-service-region-b:
    build: ./services/connector-service
    container_name: im-connector-service-b
    ports:
      - "8204:8004"
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      nacos:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      NACOS_HOST: nacos
      NACOS_PORT: "8848"
      SERVICE_HOST: connector-service-region-b
      SERVICE_PORT: "8004"
      SECRET_KEY: "your-secret-key-change-in-production"
      ACCESS_SECRET_KEY: "your-secret-key-change-in-production"
    restart: on-failure

  push-service-region-b:
    build: ./services/push-service
    container_name: im-push-service-b
    ports:
      - "8205:8005"
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      nacos:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      NACOS_HOST: nacos
      NACOS_PORT: "8848"
      SERVICE_HOST: push-service-region-b
      SERVICE_PORT: "8005"
    restart: on-failure

  storage-service-region-b:
    build: ./services/storage-service
    container_name: im-storage-service-b
    ports:
      - "8206:8006"
    depends_on:
      nacos:
        condition: service_healthy
    environment:
      NACOS_HOST: nacos
      NACOS_PORT: "8848"
      SERVICE_HOST: storage-service-region-b
      SERVICE_PORT: "8006"
      SECRET_KEY: "your-secret-key-change-in-production"
      ACCESS_SECRET_KEY: "your-secret-key-change-in-production"
    volumes:
      - storage_data:/app/static/avatars/uploads
    restart: on-failure

  # ── 网关 ─────────────────────────────────────────────────────
  apisix:
    image: apache/apisix:3.13-debian
    container_name: im-apisix
    ports:
      - "8080:9080"
    volumes:
      - ./gateway/apisix.yaml:/usr/local/apisix/conf/apisix.yaml:ro
      - ./gateway/config.yaml:/usr/local/apisix/conf/config.yaml:ro
    environment:
      - APISIX_STAND_ALONE=true
    restart: on-failure

  frontend:
    build: ./frontend
    container_name: im-frontend
    ports:
      - "3000:3000"
    depends_on:
      - apisix
    restart: on-failure

volumes:
  mysql_data:
  storage_data:
