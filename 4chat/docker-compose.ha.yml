# docker-compose.ha.yml
# 高可用中间件方案：
#   - MySQL: 1主1从
#   - Redis: 1主2从 + 3哨兵（默认）
#          或 集群模式（见下方注释）
#   - Kafka: 3 Broker
#   - Nacos: 3节点集群（共享MySQL）
#
# Redis 模式切换：
#   哨兵模式（默认）：业务服务设置 REDIS_SENTINEL_HOSTS
#   集群模式：注释掉哨兵相关服务，改用 redis-cluster-* 服务
#             业务服务改设 REDIS_CLUSTER_HOSTS=redis-cluster-0:6379,redis-cluster-1:6379,redis-cluster-2:6379
#
# 使用方式：
#   docker-compose -f docker-compose.ha.yml up -d

version: '3.8'

services:
  # ── MySQL 主从 ───────────────────────────────────────────────
  mysql-master:
    image: mysql:8.0
    container_name: im-mysql-master
    environment:
      MYSQL_ROOT_PASSWORD: root123
    ports:
      - "3306:3306"
    volumes:
      - mysql_master_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./config/mysql/master.cnf:/etc/mysql/conf.d/master.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10

  mysql-slave:
    image: mysql:8.0
    container_name: im-mysql-slave
    environment:
      MYSQL_ROOT_PASSWORD: root123
    ports:
      - "3307:3306"
    volumes:
      - mysql_slave_data:/var/lib/mysql
      - ./config/mysql/slave.cnf:/etc/mysql/conf.d/slave.cnf:ro
    depends_on:
      mysql-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10
    # 启动后自动配置主从同步
    command: >
      bash -c "
        docker-entrypoint.sh mysqld &
        sleep 20
        mysql -uroot -proot123 -e \"
          CHANGE MASTER TO
            MASTER_HOST='mysql-master',
            MASTER_USER='root',
            MASTER_PASSWORD='root123',
            MASTER_AUTO_POSITION=1;
          START SLAVE;
        \"
        wait
      "

  # ── Redis 主从 + 哨兵 ────────────────────────────────────────
  redis-master:
    image: redis:7-alpine
    container_name: im-redis-master
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-slave-1:
    image: redis:7-alpine
    container_name: im-redis-slave-1
    command: redis-server --replicaof redis-master 6379
    depends_on:
      redis-master:
        condition: service_healthy

  redis-slave-2:
    image: redis:7-alpine
    container_name: im-redis-slave-2
    command: redis-server --replicaof redis-master 6379
    depends_on:
      redis-master:
        condition: service_healthy

  redis-sentinel-1:
    image: redis:7-alpine
    container_name: im-redis-sentinel-1
    ports:
      - "26379:26379"
    command: redis-sentinel /etc/redis/sentinel.conf
    volumes:
      - ./config/redis-sentinel/sentinel.conf:/etc/redis/sentinel.conf:ro
    depends_on:
      - redis-master
      - redis-slave-1
      - redis-slave-2

  redis-sentinel-2:
    image: redis:7-alpine
    container_name: im-redis-sentinel-2
    ports:
      - "26380:26379"
    command: redis-sentinel /etc/redis/sentinel.conf
    volumes:
      - ./config/redis-sentinel/sentinel.conf:/etc/redis/sentinel.conf:ro
    depends_on:
      - redis-master
      - redis-slave-1
      - redis-slave-2

  redis-sentinel-3:
    image: redis:7-alpine
    container_name: im-redis-sentinel-3
    ports:
      - "26381:26379"
    command: redis-sentinel /etc/redis/sentinel.conf
    volumes:
      - ./config/redis-sentinel/sentinel.conf:/etc/redis/sentinel.conf:ro
    depends_on:
      - redis-master
      - redis-slave-1
      - redis-slave-2

  # ── Zookeeper（Kafka 依赖）───────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: im-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # ── Kafka 3 Broker ───────────────────────────────────────────
  kafka-1:
    image: confluentinc/cp-kafka:7.4.0
    container_name: im-kafka-1
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10

  kafka-2:
    image: confluentinc/cp-kafka:7.4.0
    container_name: im-kafka-2
    depends_on: [zookeeper]
    ports:
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  kafka-3:
    image: confluentinc/cp-kafka:7.4.0
    container_name: im-kafka-3
    depends_on: [zookeeper]
    ports:
      - "9094:9094"
    environment:
      KAFKA_BROKER_ID: 3
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-3:9092,PLAINTEXT_HOST://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  # ── Nacos 3节点集群 ──────────────────────────────────────────
  nacos-1:
    image: nacos/nacos-server:v2.3.0
    container_name: im-nacos-1
    ports:
      - "8848:8848"
      - "9848:9848"
    environment:
      MODE: cluster
      NACOS_SERVERS: "nacos-1:8848 nacos-2:8848 nacos-3:8848"
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: mysql-master
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_DB_NAME: nacos_config
      MYSQL_SERVICE_USER: root
      MYSQL_SERVICE_PASSWORD: root123
      PREFER_HOST_MODE: hostname
    depends_on:
      mysql-master:
        condition: service_healthy

  nacos-2:
    image: nacos/nacos-server:v2.3.0
    container_name: im-nacos-2
    ports:
      - "8849:8848"
      - "9849:9848"
    environment:
      MODE: cluster
      NACOS_SERVERS: "nacos-1:8848 nacos-2:8848 nacos-3:8848"
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: mysql-master
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_DB_NAME: nacos_config
      MYSQL_SERVICE_USER: root
      MYSQL_SERVICE_PASSWORD: root123
      PREFER_HOST_MODE: hostname
    depends_on:
      mysql-master:
        condition: service_healthy

  nacos-3:
    image: nacos/nacos-server:v2.3.0
    container_name: im-nacos-3
    ports:
      - "8850:8848"
      - "9850:9848"
    environment:
      MODE: cluster
      NACOS_SERVERS: "nacos-1:8848 nacos-2:8848 nacos-3:8848"
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: mysql-master
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_DB_NAME: nacos_config
      MYSQL_SERVICE_USER: root
      MYSQL_SERVICE_PASSWORD: root123
      PREFER_HOST_MODE: hostname
    depends_on:
      mysql-master:
        condition: service_healthy

  scylladb:
    image: scylladb/scylla:5.4
    container_name: im-scylladb
    ports:
      - "9042:9042"
    volumes:
      - scylla_data:/var/lib/scylla
    command: --smp 1 --memory 512M --overprovisioned 1
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── 业务服务 ─────────────────────────────────────────────────
  user-service:
    build: ./services/user-service
    container_name: im-user-service
    ports:
      - "8001:8001"
    depends_on:
      mysql-master:
        condition: service_healthy
      redis-master:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://root:root123@mysql-master:3306/im_user
      DATABASE_SLAVE_URL: mysql+pymysql://root:root123@mysql-slave:3306/im_user
      REDIS_URL: redis://redis-master:6379/0
      REDIS_SENTINEL_HOSTS: "redis-sentinel-1:26379,redis-sentinel-2:26379,redis-sentinel-3:26379"
      REDIS_SENTINEL_MASTER: mymaster
      NACOS_HOST: nacos-1
      NACOS_PORT: "8848"
      SERVICE_HOST: user-service
      SERVICE_PORT: "8001"
      SECRET_KEY: "your-secret-key-change-in-production"
      ACCESS_SECRET_KEY: "your-secret-key-change-in-production"
    restart: on-failure

  group-service:
    build: ./services/group-service
    container_name: im-group-service
    ports:
      - "8002:8002"
    depends_on:
      mysql-master:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+pymysql://root:root123@mysql-master:3306/im_group
      DATABASE_SLAVE_URL: mysql+pymysql://root:root123@mysql-slave:3306/im_group
      NACOS_HOST: nacos-1
      NACOS_PORT: "8848"
      SERVICE_HOST: group-service
      SERVICE_PORT: "8002"
      SECRET_KEY: "your-secret-key-change-in-production"
      ACCESS_SECRET_KEY: "your-secret-key-change-in-production"
    restart: on-failure

  message-service:
    build: ./services/message-service
    container_name: im-message-service
    ports:
      - "8003:8003"
    depends_on:
      scylladb:
        condition: service_healthy
      kafka-1:
        condition: service_healthy
    environment:
      SCYLLA_HOSTS: scylladb
      SCYLLA_PORT: "9042"
      SCYLLA_KEYSPACE: im_message
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
      NACOS_HOST: nacos-1
      NACOS_PORT: "8848"
      SERVICE_HOST: message-service
      SERVICE_PORT: "8003"
      SECRET_KEY: "your-secret-key-change-in-production"
      ACCESS_SECRET_KEY: "your-secret-key-change-in-production"
    restart: on-failure

  connector-service:
    build: ./services/connector-service
    container_name: im-connector-service
    ports:
      - "8004:8004"
    depends_on:
      redis-master:
        condition: service_healthy
      kafka-1:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis-master:6379/0
      REDIS_SENTINEL_HOSTS: "redis-sentinel-1:26379,redis-sentinel-2:26379,redis-sentinel-3:26379"
      REDIS_SENTINEL_MASTER: mymaster
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
      NACOS_HOST: nacos-1
      NACOS_PORT: "8848"
      SERVICE_HOST: connector-service
      SERVICE_PORT: "8004"
      SECRET_KEY: "your-secret-key-change-in-production"
      ACCESS_SECRET_KEY: "your-secret-key-change-in-production"
    restart: on-failure

  push-service:
    build: ./services/push-service
    container_name: im-push-service
    ports:
      - "8005:8005"
    depends_on:
      redis-master:
        condition: service_healthy
      kafka-1:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis-master:6379/0
      REDIS_SENTINEL_HOSTS: "redis-sentinel-1:26379,redis-sentinel-2:26379,redis-sentinel-3:26379"
      REDIS_SENTINEL_MASTER: mymaster
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
      NACOS_HOST: nacos-1
      NACOS_PORT: "8848"
      SERVICE_HOST: push-service
      SERVICE_PORT: "8005"
    restart: on-failure

  storage-service:
    build: ./services/storage-service
    container_name: im-storage-service
    ports:
      - "8006:8006"
    environment:
      NACOS_HOST: nacos-1
      NACOS_PORT: "8848"
      SERVICE_HOST: storage-service
      SERVICE_PORT: "8006"
      SECRET_KEY: "your-secret-key-change-in-production"
      ACCESS_SECRET_KEY: "your-secret-key-change-in-production"
    volumes:
      - storage_data:/app/static/avatars/uploads
    restart: on-failure

  apisix:
    image: apache/apisix:3.6.0-debian
    container_name: im-apisix
    ports:
      - "8080:9080"
    volumes:
      - ./gateway/apisix.yaml:/usr/local/apisix/conf/apisix.yaml:ro
      - ./gateway/config.yaml:/usr/local/apisix/conf/config.yaml:ro
    environment:
      - APISIX_STAND_ALONE=true
    restart: on-failure

  frontend:
    build: ./frontend
    container_name: im-frontend
    ports:
      - "3000:3000"
    depends_on:
      - apisix
    restart: on-failure

volumes:
  mysql_master_data:
  mysql_slave_data:
  scylla_data:
  storage_data:
